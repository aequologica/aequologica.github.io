<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bach – Kuijken – 64 Cantatas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/13.0.2/markdown-it.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand mb-0 h1">Bach &middot; Kuijken &mdash; The Complete Liturgical Year in 64 Cantatas</span>
    </div>
  </nav>

  <div class="container pb-5">
    <div id="content"><em>Loading...</em></div>
  </div>

  <script>
    fetch("Kuijken_Bach_64_Cantatas.md")
      .then(r => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.text();
      })
      .then(md => {
        const mdit = window.markdownit({ html: true, linkify: true, typographer: true });
        document.getElementById("content").innerHTML = mdit.render(md);

        document.querySelectorAll("#content table").forEach(t => {
          t.classList.add("table", "table-bordered", "table-striped", "table-hover", "table-sm");
          const wrapper = document.createElement("div");
          wrapper.classList.add("table-responsive", "mb-4");
          t.parentNode.insertBefore(wrapper, t);
          wrapper.appendChild(t);
        });

        document.querySelectorAll("#content h1").forEach(el =>
          el.classList.add("display-5", "fw-bold", "border-bottom", "pb-2", "mb-4", "mt-4"));
        document.querySelectorAll("#content h2").forEach(el =>
          el.classList.add("h3", "mt-5", "mb-3", "text-primary"));
        document.querySelectorAll("#content h3").forEach(el =>
          el.classList.add("h5", "mt-4", "mb-2", "text-secondary"));
        document.querySelectorAll("#content p").forEach(el =>
          el.classList.add("text-muted"));
        document.querySelectorAll("#content hr").forEach(el =>
          el.classList.add("my-4"));
      })
      .catch(err => {
        document.getElementById("content").innerHTML =
          "<div class='alert alert-danger'>Error: " + err.message + "</div>";
      });
  </script>

</body>
</html>
